# Voice Notepad 設定ファイル

transcription:
  # CPUでの精度と速度のバランスを取るため既定はmedium。速度優先なら "small" に変更。
  model: "medium"
  language: "ja"
  initial_prompt: ""  # 短いリアルタイム認識ではプロンプト文が混入しやすいため既定は空
  hotwords: ""  # 認識させたい固有名詞・専門用語をスペース区切りで追加
  device: "auto"  # "cuda" / "cpu" / "auto"
  compute_type: "auto"  # "auto"で最適な型を自動選択（GPU: float16, CPU: int8）
  cpu_threads: "auto"  # CPU時は論理コア数から自動設定
  num_workers: 1
  beam_size: 3  # 大きいほど精度寄り、小さいほど高速
  best_of: 1
  temperature: 0.0
  condition_on_previous_text: false  # マイク/スピーカー間で文脈を混ぜない
  vad_filter: false  # アプリ側VAD済みなので二重VADを避ける
  vad_min_silence_duration_ms: 500
  no_speech_threshold: 0.6
  log_prob_threshold: -1.0
  compression_ratio_threshold: 2.4
  use_batched: false  # 長尺処理向け。リアルタイム短文ではfalseを推奨
  batch_size: 4
  pad_duration_ms: 200  # 短いほど低遅延。認識が途切れる場合は200-300へ上げる

performance:
  mode: "speed"  # "speed" / "accuracy"
  speed:
    transcription_model: "small"
    beam_size: 1
    speaker_max_speech_duration_ms: 3000
    defer_correction_while_recording: true
    backlog_batch_threshold: 3
    backlog_batch_max_segments: 3
  accuracy:
    transcription_model: "medium"
    beam_size: 3
    speaker_max_speech_duration_ms: 6000
    defer_correction_while_recording: false
    backlog_batch_threshold: 999
    backlog_batch_max_segments: 1

audio:
  sample_rate: 16000
  channels: 1
  chunk_duration_ms: 32  # VAD チャンク長(ms) ※16000Hzで必ず512サンプル

vad:
  enabled: true
  threshold: 0.4
  min_speech_duration_ms: 200
  min_silence_duration_ms: 500
  speaker_max_speech_duration_ms: 6000  # スピーカー音声は精度優先で約6秒ごとに認識へ回す

ui:
  font_family: "Yu Gothic UI"
  font_size: 12
  window_width: 800
  window_height: 600
  theme: "light"  # "light" / "dark"

storage:
  save_directory: "notes"
  auto_save: true
  auto_save_interval_sec: 60

correction:
  enabled: true
  ollama_url: "http://localhost:11434"
  model: "qwen2.5:7b"            # 1段目: 誤変換補正
  review_enabled: true
  review_model: "qwen2.5:7b"     # 2段目: 保守的な文書校閲。軽くしたいなら "qwen2.5:3b"
  batch_interval_sec: 15          # 校正バッチの実行間隔（秒）
  min_segments: 3                 # 校正を開始する最小セグメント数
  timeout_sec: 30                 # Ollama API タイムアウト（秒）
